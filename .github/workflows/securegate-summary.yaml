name: SecureGate AI Scheduled Summaries

on:
  schedule:
    # Daily summary at 15:00 Dubai time / 11:00 UTC.
    - cron: "15 12 * * *"
    # Weekly summary every Monday at 18:00 Dubai time / 14:00 UTC.
    - cron: "0 14 * * 1"
    # Monthly summary on the 1st day at 21:00 Dubai time / 17:00 UTC.
    - cron: "0 17 1 * *"
  workflow_dispatch:
    inputs:
      period:
        description: "Summary period to send"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly
          - monthly

jobs:
  daily-summary:
    if: github.event_name == 'workflow_dispatch' && inputs.period == 'daily' || github.event_name == 'schedule' && github.event.schedule == '0 11 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Send SecureGate AI daily summary
        env:
          SECUREGATE_URL: ${{ secrets.SECUREGATE_URL }}
          SECUREGATE_API_KEY: ${{ secrets.SECUREGATE_API_KEY }}
        run: |
          curl -fsS -X POST "${SECUREGATE_URL%/}/api/v1/notifications/summary/daily"             -H "Authorization: Bearer $SECUREGATE_API_KEY"

  weekly-summary:
    if: github.event_name == 'workflow_dispatch' && inputs.period == 'weekly' || github.event_name == 'schedule' && github.event.schedule == '0 14 * * 1'
    runs-on: ubuntu-latest
    steps:
      - name: Send SecureGate AI weekly summary
        env:
          SECUREGATE_URL: ${{ secrets.SECUREGATE_URL }}
          SECUREGATE_API_KEY: ${{ secrets.SECUREGATE_API_KEY }}
        run: |
          curl -fsS -X POST "${SECUREGATE_URL%/}/api/v1/notifications/summary/weekly"             -H "Authorization: Bearer $SECUREGATE_API_KEY"

  monthly-summary:
    if: github.event_name == 'workflow_dispatch' && inputs.period == 'monthly' || github.event_name == 'schedule' && github.event.schedule == '0 17 1 * *'
    runs-on: ubuntu-latest
    steps:
      - name: Send SecureGate AI monthly summary
        env:
          SECUREGATE_URL: ${{ secrets.SECUREGATE_URL }}
          SECUREGATE_API_KEY: ${{ secrets.SECUREGATE_API_KEY }}
        run: |
          curl -fsS -X POST "${SECUREGATE_URL%/}/api/v1/notifications/summary/monthly" \
            -H "Authorization: Bearer $SECUREGATE_API_KEY"
